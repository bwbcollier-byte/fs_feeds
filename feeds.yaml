# Fashion news feed sources for the fs_news scraper.
#
# Each entry:
#   url:        RSS/Atom feed URL
#   name:       human-readable source name (stored in raw_payload.source_name)
#   domain:     unique publisher domain — used with external_id for dedupe key
#   category:   industry_news | editorial | streetwear_drops | events | jobs | trade
#   country:    ISO 3166-1 alpha-2 (US, UK, AU, FR, IT, DE, ES, JP, KR, CN, NZ, GLOBAL)
#   language:   ISO 639-1 (en, ja, ko, fr, it, de, es, zh)
#   paywalled:  true if feeds mostly title+summary; scraper will skip full-text fetch
#   extract_body: override full-text extraction (default true unless paywalled)
#   user_agent: optional — "browser" to use a Chrome UA (for sites that 403 on bot UAs)
#
# Dedupe is on (domain, source_external_id). To retire a feed, comment it out.
# Feeds marked DISABLED below were confirmed dead/blocked on 2026-04-22 — see the
# diagnosis comment on each for why. Uncomment to re-probe if you suspect revival.

feeds:

