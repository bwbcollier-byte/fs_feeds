name: ingest-feeds

# Polls every active feed in fs_feeds (or feeds.yaml) and upserts new
# articles into fs_news. Picks up per-feed state (ETag, last_modified,
# consecutive_failures) from fs_feeds via --feeds-from-db; also persists
# .scraper_state.sqlite across runs via actions/cache so the local ETag
# cache survives the ephemeral runner.

on:
  schedule:
    # Every 2 hours, 5 min past the hour (offset from discover.yml's daily
    # 19:00 so they don't fight for the semaphore if they happen to overlap).
    - cron: "5 */2 * * *"
  workflow_dispatch:
    inputs:
      feeds_from:
        description: "Feed source"
        required: false
        default: "db"
        type: choice
        options: [db, yaml]
      feed:
        description: "Filter to a domain or URL substring (optional)"
        required: false
        default: ""
        type: string
      limit:
        description: "Max articles per feed (0 = no limit)"
        required: false
        default: "0"
        type: string
      dry_run:
        description: "Parse but don't write"
        required: false
        default: false
        type: boolean
      all_languages:
        description: "Include non-English feeds (default: English-only)"
        required: false
        default: false
        type: boolean

# One ingest run at a time. If the 2-hourly cron fires while a previous
# run is still executing (first runs, no ETag cache, can be slow), queue
# instead of running two in parallel against the same DB.
concurrency:
  group: ingest-feeds
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    # Cold first run (no ETag cache, 690 feeds, body fetches) is ~60-90 min.
    # Steady-state runs with 304s are much shorter. Cap at 3h for safety.
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Persist .scraper_state.sqlite (ETag cache + consecutive-failure
      # counter) across runs. Without this, every scheduled run re-fetches
      # every feed fully instead of getting 304s on unchanged ones.
      #
      # Split restore/save so we always save on the way out, even if the
      # scraper exited non-zero (we still learned useful state).
      - name: Restore scraper state
        uses: actions/cache/restore@v4
        id: state-cache
        with:
          path: .scraper_state.sqlite
          key: scraper-state-${{ github.run_id }}
          restore-keys: |
            scraper-state-

      - name: Run ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LOG_LEVEL: INFO
        run: |
          set -euo pipefail
          ARGS=()

          FEEDS_FROM="${{ github.event.inputs.feeds_from || 'db' }}"
          if [[ "$FEEDS_FROM" == "db" ]]; then
            ARGS+=(--feeds-from-db)
          fi

          FEED="${{ github.event.inputs.feed || '' }}"
          if [[ -n "$FEED" ]]; then
            ARGS+=(--feed "$FEED")
          fi

          LIMIT="${{ github.event.inputs.limit || '0' }}"
          if [[ "$LIMIT" != "0" ]]; then
            ARGS+=(--limit "$LIMIT")
          fi

          if [[ "${{ github.event.inputs.dry_run || 'false' }}" == "true" ]]; then
            ARGS+=(--dry-run)
          fi

          if [[ "${{ github.event.inputs.all_languages || 'false' }}" == "true" ]]; then
            ARGS+=(--all-languages)
          fi

          echo "▶ python fashion_scraper.py ${ARGS[*]}"
          python fashion_scraper.py "${ARGS[@]}"

      - name: Save scraper state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .scraper_state.sqlite
          key: scraper-state-${{ github.run_id }}

      - name: Save run log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ingest-log-${{ github.run_id }}
          path: |
            *.log
          if-no-files-found: ignore
          retention-days: 14
